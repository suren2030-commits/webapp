apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator
  namespace: apoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulator
  template:
    metadata:
      labels:
        app: simulator
    spec:
      containers:
      - name: simulator
        image: host.docker.internal:5000/apoc-simulator:latest
        imagePullPolicy: Always
        command: ["node", "src/index.js"]
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        env:
        - name: BACKEND_INTERNAL_URL
          value: "http://backend.apoc.svc.cluster.local:3000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
