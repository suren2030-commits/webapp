apiVersion: v1
kind: Namespace
metadata:
  name: apoc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: apoc
data:
  PORT:                 "3000"
  MYSQL_HOST:           "host.docker.internal"
  MYSQL_PORT:           "3306"
  MYSQL_USER:           "root"
  MYSQL_DATABASE:       "webapp_db"
  CLICKHOUSE_URL:       "http://clickhouse.clickhouse.svc.cluster.local:8123"
  CLICKHOUSE_USER:      "apoc_user"
  CLICKHOUSE_DATABASE:  "apoc_analytics"
  KEYCLOAK_URL:         "http://keycloak.keycloak.svc.cluster.local"
  KEYCLOAK_REALM:       "apoc"
  CORS_ORIGIN:          "https://airport.ops"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: apoc
type: Opaque
stringData:
  MYSQL_PASSWORD:        "Display@9900"
  CLICKHOUSE_PASSWORD:   "apoc123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: apoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: host.docker.internal:5000/apoc-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: apoc
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: apoc
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size:    "10m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.airport.ops
    secretName: airport-tls
  rules:
  - host: api.airport.ops
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 80
