apiVersion: batch/v1
kind: CronJob
metadata:
  name: data-cleanup
  namespace: apoc
spec:
  schedule: "0 2 * * *"   # 2 AM UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: host.docker.internal:5000/apoc-simulator:latest
            imagePullPolicy: Always
            command: ["node", "src/cleanup.js"]
            envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "100m"
