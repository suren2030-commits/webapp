apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apoc-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/suren2030-commits/webapp.git
    targetRevision: main
    path: k8s
    directory:
      include: "backend.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: apoc
  syncPolicy: {}   # manual — click Sync in ArgoCD UI to deploy
---
apiVersion: argoproj.io/v1alpha1
kind: Application
